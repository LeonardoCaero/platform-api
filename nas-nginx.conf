# ─────────────────────────────────────────────────────────────────────────────
# NAS system nginx config for plataforma-lcl.ddns.net
#
# Deploy to: /etc/nginx/sites-available/plataforma-lcl.ddns.net
# Enable with: sudo ln -s /etc/nginx/sites-available/plataforma-lcl.ddns.net \
#                         /etc/nginx/sites-enabled/plataforma-lcl.ddns.net
# ─────────────────────────────────────────────────────────────────────────────

# ── HTTP: ACME challenge + redirect to HTTPS ─────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name plataforma-lcl.ddns.net;

    # Let's Encrypt webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: Reverse proxy to Docker containers ─────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name plataforma-lcl.ddns.net;

    ssl_certificate     /etc/letsencrypt/live/plataforma-lcl.ddns.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/plataforma-lcl.ddns.net/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Limit upload size (increase for larger images if needed)
    client_max_body_size 10m;

    # Proxy API requests to Docker API container
    location /api/sse {
        proxy_pass         http://127.0.0.1:4000/api/sse;
        proxy_http_version 1.1;
        proxy_set_header   Connection '';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;
    }

    location /api/ {
        proxy_pass         http://127.0.0.1:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Serve uploaded files (avatars, logos) from Express static
    location /uploads/ {
        proxy_pass         http://127.0.0.1:4000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Proxy everything else to Docker frontend container
    location / {
        proxy_pass         http://127.0.0.1:8080/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
